version: "3.9"

# Production override — uses the host PostgreSQL, no postgres service needed.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    profiles:
      - disabled          # effectively removes the service in prod

  backend:
    restart: always
    depends_on: []        # no postgres container in prod
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.15"
          memory: 128M
